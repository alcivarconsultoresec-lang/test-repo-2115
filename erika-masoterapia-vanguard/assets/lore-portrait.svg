<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 1440" width="720" height="1440" role="img" aria-label="Lore, terapeuta de masajes de relajación y antiestrés">
  <defs>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff1df" stop-opacity=".12"/>
      <stop offset=".54" stop-color="#c45d5d" stop-opacity=".08"/>
      <stop offset="1" stop-color="#223423" stop-opacity=".18"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feBlend in="SourceGraphic" in2="blur" mode="screen"/>
    </filter>
  </defs>
  <image href="data:image/jpeg;base64," x="0" y="0" width="720" height="1440" preserveAspectRatio="xMidYMid slice"/>
  <rect width="720" height="1440" fill="url(#warm)"/>
  <rect y="970" width="720" height="470" fill="url(#fade)" opacity=".0"/>
</svg>